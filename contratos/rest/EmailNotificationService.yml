openapi: 3.0.3
info:
  title: EmailNotificationService API
  description: |
    Servicio de utilidad para el envío de notificaciones por email.
    Puede ser utilizado por múltiples servicios del sistema (matrículas,
    certificados, notificaciones generales).
    Clasificación SOA: Utility Service.
  version: 1.0.0
  contact:
    name: Grupo 20 – MTIS 2025-2026

servers:
  - url: https://elearning.ua.es/api/v1
    description: Servidor de producción
  - url: http://localhost:3000/api/v1
    description: Servidor de desarrollo

tags:
  - name: notifications
    description: Operaciones de notificación por email

paths:

  /notifications/email:
    post:
      tags: [notifications]
      summary: Enviar email genérico
      operationId: sendEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailRequest'
      responses:
        '200':
          description: Email enviado correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/enrollment:
    post:
      tags: [notifications]
      summary: Enviar notificación de matrícula
      operationId: sendEnrollmentNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnrollmentNotification'
      responses:
        '200':
          description: Notificación enviada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /notifications/certificate:
    post:
      tags: [notifications]
      summary: Enviar notificación de certificado
      operationId: sendCertificateNotification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CertificateNotification'
      responses:
        '200':
          description: Notificación enviada correctamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

components:

  schemas:

    EmailRequest:
      type: object
      properties:
        to:
          type: string
          format: email
          example: "estudiante@alu.ua.es"
        subject:
          type: string
          example: "Bienvenido a la plataforma"
        body:
          type: string
          example: "Tu cuenta ha sido creada correctamente."
      required: [to, subject, body]

    EnrollmentNotification:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        courseId:
          type: string
          format: uuid
        email:
          type: string
          format: email
      required: [userId, courseId, email]

    CertificateNotification:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        certificateId:
          type: string
          format: uuid
        email:
          type: string
          format: email
      required: [userId, certificateId, email]

    NotificationResponse:
      type: object
      properties:
        status:
          type: string
          example: "sent"
        timestamp:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string

  responses:

    BadRequest:
      description: Petición incorrecta
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    InternalError:
      description: Error interno del sistema
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'